<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="new_file.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="generateSKU.js"></script>
    <script src="updateProductImage.js"></script>
    <script src="updateSelectedOptions.js"></script>
    <script src="applyConditionalLogic.js"></script>
    <script src="main.js"></script>
</head>
<body>
    <div id="product-image">
        <img src="default_image.jpg" alt="Product Image">
    </div>
    <div id="product-details">
        <!-- SKU code and selected options will be displayed here -->
    </div>
    <form id="product-configurator">
        <select id="frame-color">
            <option value="01">Black Metal</option>
            <option value="02">Gold Metal</option>
            <option value="03">Silver Metal</option>
        </select>
        <select id="frame-thickness">
            <option value="01">Thin Frame</option>
            <option value="02">Wide Frame</option>
        </select>
        <select id="style">
            <option value="01">Full Frame Inset</option>
            <option value="02">Full Frame Edge</option>
            <option value="03">Double Long Side Inset</option>
            <option value="04">Double Long Side Edge</option>
            <option value="05">No Frost</option>
            <option value="06">Double Short Side Edge</option>
            <option value="07">Double Short Side Inset</option>
            <option value="08">Single Long Side Edge</option>
            <option value="09">Single Short Side Edge</option>
            <option value="10">Single Short Side Inset</option>
            <option value="11">Round Full Frame Edge</option>
            <option value="12">Round No Frost</option>
        </select>
        <select id="orientation">
            <option value="1">Vertical Mounting</option>
            <option value="2">Horizontal Mounting</option>
        </select>
        <select id="light-direction">
            <option value="1">Direct</option>
            <option value="2">Indirect</option>
            <option value="3">Both Direct And Indirect</option>
        </select>
        <select id="size">
            <option value="1836">18"x36"</option>
            <option value="2436">24"x36"</option>
            <option value="3036">30"x36"</option>
        </select>
        <input type="number" id="custom-width" placeholder="Custom Width">
        <input type="number" id="custom-height" placeholder="Custom Height">
        <input type="number" id="quantity" placeholder="Quantity">
        <select id="color-temperature">
            <option value="27">Warm Light (2700k)</option>
            <option value="30">Warm Light (3000k)</option>
            <option value="35">Mid-Warm Light (3500k)</option>
            <option value="50">Cool Light (5000k)</option>
            <option value="00">Adjustable</option>
        </select>
        <select id="controls">
            <option value="01">Touch Sensors</option>
            <option value="02">Matrix Touch System</option>
            <option value="03">Handheld Controller</option>
        </select>
        <select id="accessories">
            <option value="00">None</option>
            <option value="01">Night Light</option>
            <option value="02">Anti-Fog</option>
        </select>
        <select id="lighting-output">
            <option value="1">Standard</option>
            <option value="2">High</option>
        </select>
        <select id="dimming">
            <option value="1">Non-Dimming</option>
            <option value="2">ELV Dimmable</option>
            <option value="3">0-10 Dimmable</option>
        </select>
    </form>
    <button id="download-pdf">Download PDF</button>
</body>
</html>
