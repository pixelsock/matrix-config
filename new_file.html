<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="new_file.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="new_file.js"></script>
</head>
<body>
    <div id="product-image">
        <img src="default_image.jpg" alt="Product Image">
    </div>
    <div id="product-details">
        <!-- SKU code and selected options will be displayed here -->
    </div>
    <form id="product-configurator">
        <select id="frame-color">
            <option value="black">Black Metal</option>
            <option value="gold">Gold Metal</option>
            <option value="silver">Silver Metal</option>
        </select>
        <!-- Add the rest of the options in a similar way -->
        <input type="number" id="custom-width" placeholder="Custom Width">
        <input type="number" id="custom-height" placeholder="Custom Height">
        <input type="number" id="quantity" placeholder="Quantity">
    </form>
    <button id="download-pdf">Download PDF</button>
</body>
</html>
