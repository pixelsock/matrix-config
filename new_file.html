<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="new_file.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="main.js"></script>
</head>
<body>
    <div id="product-image">
        <img src="default_image.jpg" alt="Product Image">
    </div>
    <div id="product-details">
        <!-- SKU code and selected options will be displayed here -->
    </div>
    <form id="product-configurator">
        <select id="frame-color">
            <option value="black">Black Metal</option>
            <option value="gold">Gold Metal</option>
            <option value="silver">Silver Metal</option>
        </select>
        <select id="frame-thickness">
            <option value="thin">Thin Frame</option>
            <option value="wide">Wide Frame</option>
        </select>
        <select id="style">
            <option value="full-frame-inset">Full Frame Inset</option>
            <option value="full-frame-edge">Full Frame Edge</option>
            <option value="double-long-side-inset">Double Long Side Inset</option>
            <option value="double-long-side-edge">Double Long Side Edge</option>
            <option value="no-frost">No Frost</option>
            <option value="double-short-side-edge">Double Short Side Edge</option>
            <option value="double-short-side-inset">Double Short Side Inset</option>
            <option value="single-long-side-edge">Single Long Side Edge</option>
            <option value="single-short-side-edge">Single Short Side Edge</option>
            <option value="single-short-side-inset">Single Short Side Inset</option>
            <option value="round-full-frame-edge">Round Full Frame Edge</option>
            <option value="round-no-frost">Round No Frost</option>
        </select>
        <select id="orientation">
            <option value="vertical">Vertical Mounting</option>
            <option value="horizontal">Horizontal Mounting</option>
        </select>
        <select id="light-direction">
            <option value="direct">Direct</option>
            <option value="indirect">Indirect</option>
            <option value="both">Both Direct And Indirect</option>
        </select>
        <select id="size">
            <option value="18x36">18"x36"</option>
            <option value="24x36">24"x36"</option>
            <option value="30x36">30"x36"</option>
        </select>
        <input type="number" id="custom-width" placeholder="Custom Width">
        <input type="number" id="custom-height" placeholder="Custom Height">
        <input type="number" id="quantity" placeholder="Quantity">
        <select id="color-temperature">
            <option value="2700">Warm Light (2700k)</option>
            <option value="3000">Warm Light (3000k)</option>
            <option value="3500">Mid-Warm Light (3500k)</option>
            <option value="5000">Cool Light (5000k)</option>
            <option value="adjustable">Adjustable (2700K-6500k)</option>
        </select>
        <select id="controls">
            <option value="touch-sensors">Touch Sensors</option>
            <option value="matrix">Matrix Touch System</option>
            <option value="handheld">Handheld Controller</option>
        </select>
        <select id="accessories">
            <option value="none">None</option>
            <option value="night-light">Night Light</option>
            <option value="anti-fog">Anti-Fog</option>
        </select>
        <select id="lighting-output">
            <option value="standard">Standard</option>
            <option value="high">High</option>
        </select>
        <select id="dimming">
            <option value="non-dimming">Non-Dimming</option>
            <option value="elv">ELV Dimmable</option>
            <option value="0-10">0-10 Dimmable</option>
        </select>
    </form>
    <button id="download-pdf">Download PDF</button>
</body>
</html>
